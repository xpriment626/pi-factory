edition = 4

[agent]
name = "factory-architect"
version = "0.1.0"
description = "Architect agent for the local Pi factory wiring demo. It represents architecture review and system boundary work."
summary = "Local factory architect"
readme = "Local-only demo agent launched by Coral for pi-factory wiring tests."
keywords = ["factory", "architect", "local"]
license = { type = "text", text = "MIT" }

[runtimes.executable]
transport = "streamable_http"
path = "node"
arguments = ["../../worker/pi-coral-worker.mjs", "--role", "architect"]
