edition = 4

[agent]
name = "factory-reviewer"
version = "0.1.0"
description = "Reviewer agent for the local Pi factory wiring demo. It represents QA, review, and acceptance checks."
summary = "Local factory reviewer"
readme = "Local-only demo agent launched by Coral for pi-factory wiring tests."
keywords = ["factory", "reviewer", "local"]
license = { type = "text", text = "MIT" }

[runtimes.executable]
transport = "streamable_http"
path = "node"
arguments = ["../../worker/pi-coral-worker.mjs", "--role", "reviewer"]
